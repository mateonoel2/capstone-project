parsers:
  llama_parser:
    model: "claude-3-5-sonnet-20241022"
    separator: "\n---\n"
    embedding_model: "BAAI/bge-small-en-v1.5"
    similarity_top_k: 5
    response_mode: "tree_summarize"

  regex_parser:
    min_confidence: 0.7

data:
  raw_dir: "data/raw"
  processed_dir: "data/processed"
  results_dir: "data/results"

  csv:
    input: "data/raw/bank_accounts_raw.csv"
    output: "data/raw/bank_accounts_downloaded.csv"
    processed: "data/processed/bank_accounts_clean.csv"

  bank_statements:
    raw: "data/raw/bank_statements"

file_validation:
  min_size_bytes: 1024
  max_size_bytes: 52428800
  valid_extensions:
    - ".pdf"
    - ".jpg"
    - ".jpeg"
    - ".png"

experiments:
  output_dir: "data/results"
  log_dir: "data/results/logs"
